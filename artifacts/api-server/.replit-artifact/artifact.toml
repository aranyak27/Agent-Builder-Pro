kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
# Build the API server AND install the voice agent's Python dependencies at
# build time, so the production container does not pay a ~30s pip install on
# every cold start. This is critical for low-latency call handling.
args = ["bash", "-c", "pnpm --filter @workspace/api-server run build && python3 -m pip install --no-cache-dir -r artifacts/voice-agent-worker/requirements.txt"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# Runs both the API server and the voice agent worker in the same container.
# The worker connects to LiveKit cloud (same keys as dev) and posts outcomes/
# transcripts to localhost:8080 — always co-located, always reachable.
args = ["bash", "artifacts/api-server/start.sh"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
